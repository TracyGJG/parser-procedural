<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Harness</title>
    <link href="JSON-logo.svg" rel="icon" type="image/svg+xml" />
  </head>
  <body>
    <script type="module">
      import packageJson from './package.json' with { type: 'json' };

      import jsonParser from './src/json-parser.js';

      const exercise = (inputData) =>
        runTest(JSON.stringify(inputData, null, 2));

      function runTest(jsonText) {
        console.log(`\nTestcase: |${jsonText}|`);
        const result = jsonParser(jsonText);
        result.error
          ? console.error(result.error)
          : console.log(JSON.stringify(result.results));
      }

      console.clear();
      exercise(true);
      exercise(false);
      exercise(null);
      runTest('test');
      runTest(' true false ');

      runTest('');
      runTest('"');
      exercise('');
      exercise('A');
      exercise('\t');
      exercise('\u1234');
      exercise(' ');
      runTest('    "Hello, World!"  ');

      runTest('{');
      exercise({});
      runTest('{   }');
      runTest('{ "Hello": "World"  }');
      runTest('{ "Hello" : 666, "World": 42  }');

      runTest('[');
      runTest('[   ]');
      exercise(['Hello']);
      exercise(['Hello', ['world']]);
      exercise([true, false, null]);

      runTest('-0');
      exercise(0);
      exercise(42);
      exercise(-42.13);
      exercise(42e-56);
      exercise(42.13e56);
      runTest('42.');
      runTest('42e');
      runTest('42.13e');

      // exercise(packageJson);
    </script>
  </body>
</html>
